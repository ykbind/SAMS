<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Attendance Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }
        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 32px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .attendance-table th, .attendance-table td {
            border-bottom: 1px solid #eee;
            padding: 16px 12px;
            text-align: left;
        }
        .attendance-table th {
            background: linear-gradient(90deg, #4e54c8 0%, #8f94fb 100%);
            color: #fff;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .attendance-table tr:last-child td {
            border-bottom: none;
        }
        .attendance-table a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .attendance-table a:hover {
            color: #fda085;
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            .attendance-table, .attendance-table th, .attendance-table td {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">SAMS</div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('teacher') }}" class="nav-link">Teacher Section</a>
                <a href="{{ url_for('admin') }}" class="nav-link">Admin Section</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <h1 class="title">Admin - Attendance Records</h1>
        <div class="action-bar">
            <a href="{{ url_for('admin') }}" class="cta-button">⟳ Refresh</a>
        </div>
        <table class="attendance-table">
            <thead>
                <tr>
                    <th>Lecture Name</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for (lecture_name, date, time), records in lectures.items() %}
                    <tr>
                        <td>{{ lecture_name }}</td>
                        <td>{{ date }}</td>
                        <td>{{ time }}</td>
                        <td><a href="{{ url_for('show_attendance', lecture_name=lecture_name, date=date, time=time) }}">Show Attendance</a></td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
