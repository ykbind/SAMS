<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="main-content">
        <h1 class="title">Submit Attendance for {{ lecture_name }}</h1>
        <div class="lecture-details">
            <strong>Lecture:</strong> {{ lecture_name }}<br>
            <strong>Date:</strong> {{ date }}<br>
            <strong>Time:</strong> {{ time }}
        </div>
        <form method="POST" action="/attendance-form" enctype="multipart/form-data">
            <input type="hidden" name="lecture_name" value="{{ lecture_name }}">
            <input type="hidden" name="date" value="{{ date }}">
            <input type="hidden" name="time" value="{{ time }}">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required class="input-lg">
            <label for="roll_no">Roll No:</label>
            <input type="text" id="roll_no" name="roll_no" required class="input-lg">
            <label for="photo">  </label>
            <input type="file" id="photo" name="photo" accept="image/*" capture="environment" required class="input-lg" style="display:none;">
            <label for="photo" class="cta-button" style="width:100%;text-align:center;cursor:pointer;margin-bottom:0.8rem;">Take Photo</label>
            <span id="photo-filename" style="display:block;margin-bottom:0.8rem;color:#888;font-size:0.98rem;"></span>
            <small>
                Please use your device camera to take a live photo.
            </small>
            <button type="submit" class="cta-button">Submit Attendance</button>
        </form>
        {% if success_message %}
            <div class="description success-message">
                {{ success_message }}
            </div>
        {% endif %}
    </main>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const photoInput = document.getElementById('photo');
    const photoLabel = document.querySelector('label[for="photo"].cta-button');
    const photoFilename = document.getElementById('photo-filename');
    if (photoInput && photoLabel && photoFilename) {
        photoInput.addEventListener('change', function() {
            if (photoInput.files && photoInput.files.length > 0) {
                photoFilename.textContent = photoInput.files[0].name;
            } else {
                photoFilename.textContent = '';
            }
        });
    }
});
</script>
</body>
</html>
