<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Attendance</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
        }
        .header-bar {
            background: linear-gradient(90deg, #4e54c8 0%, #8f94fb 100%);
            color: #111 !important;
            padding: 28px 0 18px 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(78,84,200,0.10);
            letter-spacing: 2px;
        }
        .main-content {
            max-width: 480px;
            margin: 48px auto;
            padding: 0 12px;
        }
        .form-card {
            background: #fff;
            padding: 36px 28px 28px 28px;
            border-radius: 18px;
            box-shadow: 0 6px 32px rgba(0,0,0,0.10);
            position: relative;
        }
        h1 {
            color: #4e54c8;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .lecture-details {
            margin-bottom: 22px;
            padding: 18px 14px;
            background: linear-gradient(90deg, #e0e7ff 0%, #f6f7ff 100%);
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(78,84,200,0.07);
            color: #333;
            font-size: 1.08rem;
        }
        form {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4e54c8;
            letter-spacing: 1px;
            font-size: 1.04rem;
        }
        input[type="text"], input[type="file"] {
            padding: 13px;
            width: 100%;
            border: 1.5px solid #e0e0e0;
            border-radius: 7px;
            font-size: 1.05rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f9faff;
        }
        input[type="text"]:focus, input[type="file"]:focus {
            border-color: #8f94fb;
            outline: none;
            box-shadow: 0 0 0 2px #e0e7ff;
        }
        input[type="file"] {
            background: #f6f7ff;
            padding: 10px;
        }
        button {
            background: linear-gradient(90deg, #4e54c8 0%, #8f94fb 100%);
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 28px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(78,84,200,0.10);
            border-radius: 8px;
            font-size: 1.13rem;
            padding: 14px 0;
            width: 100%;
            letter-spacing: 1px;
        }
        button:hover {
            background: linear-gradient(90deg, #8f94fb 0%, #4e54c8 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .success-message {
            color: #43a047;
            font-weight: bold;
            margin-top: 28px;
            text-align: center;
            background: #e8f5e9;
            border-radius: 10px;
            padding: 14px 0;
            box-shadow: 0 1px 6px rgba(67,160,71,0.10);
            font-size: 1.08rem;
        }
        small {
            color: #888;
            display: block;
            margin-top: 4px;
            margin-bottom: 12px;
            font-size: 0.98rem;
        }
        @media (max-width: 600px) {
            .main-content {
                max-width: 98vw;
                padding: 0 2vw;
            }
            .form-card {
                padding: 18px 6vw 18px 6vw;
            }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <h1 style="color:#111;">Submit Attendance</h1>
    </div>
    <div class="main-content">
        <div class="form-card">
            <h1>Submit Attendance for {{ lecture_name }}</h1>
            <div class="lecture-details">
                <strong>Lecture:</strong> {{ lecture_name }}<br>
                <strong>Date:</strong> {{ date }}<br>
                <strong>Time:</strong> {{ time }}
            </div>
            <form method="POST" action="/attendance-form" enctype="multipart/form-data">
                <input type="hidden" name="lecture_name" value="{{ lecture_name }}">
                <input type="hidden" name="date" value="{{ date }}">
                <input type="hidden" name="time" value="{{ time }}">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="roll_no">Roll No:</label>
                <input type="text" id="roll_no" name="roll_no" required>
                <label for="photo">Photo:</label>
                <input type="file" id="photo" name="photo" accept="image/*" capture="environment" required>
                <small>
                    Please use your device camera to take a live photo.
                </small>
                <button type="submit">Submit Attendance</button>
            </form>
            {% if success_message %}
                <div class="success-message">{{ success_message }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
