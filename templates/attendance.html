<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 32px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .attendance-table th, .attendance-table td {
            border-bottom: 1px solid #eee;
            padding: 16px 12px;
            text-align: left;
        }
        .attendance-table th {
            background: linear-gradient(90deg, #4e54c8 0%, #8f94fb 100%);
            color: #fff;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .attendance-table tr:last-child td {
            border-bottom: none;
        }
        .attendance-table img {
            width: 80px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(78,84,200,0.10);
            background: #f2f2f2;
            padding: 4px;
        }
        .attendance-table .cta-button {
            background: #3498db;
            color: #fff;
            border: none;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(78,84,200,0.08);
            margin: 0;
            text-decoration: none;
        }
        .attendance-table .cta-button:hover {
            background: linear-gradient(90deg, #8f94fb 0%, #4e54c8 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .delete-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(231,76,60,0.08);
            margin-left: 8px;
        }
        .delete-btn:hover {
            background: #c0392b;
            transform: translateY(-2px) scale(1.03);
        }
        .total-attended {
            margin-top: 24px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #4e54c8;
            text-align: right;
        }
        @media (max-width: 700px) {
            .attendance-table, .attendance-table th, .attendance-table td {
                font-size: 0.95rem;
            }
            .attendance-table img {
                width: 50px;
            }
        }
        .back-btn {
            display: inline-block;
            margin: 32px 0 0 0;
            padding: 12px 28px;
            background: linear-gradient(90deg, #8f94fb 0%, #4e54c8 100%);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px rgba(78,84,200,0.10);
            transition: background 0.2s, transform 0.1s;
            border: none;
            cursor: pointer;
        }
        .back-btn:hover {
            background: linear-gradient(90deg, #4e54c8 0%, #8f94fb 100%);
            transform: translateY(-2px) scale(1.03);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">SAMS</div>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('teacher') }}" class="nav-link">Teacher Section</a>
                <a href="{{ url_for('admin') }}" class="nav-link">Admin Section</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <h1 class="title">Attendance Records</h1>
        <table class="attendance-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Photo</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for record in records %}
                    <tr>
                        <td>{{ record.student_name }}</td>
                        <td>{{ record.roll_no }}</td>
                        <td>
                            {% if record.photo %}
                                <button class="cta-button" type="button"
                                    data-photo="{{ url_for('static', filename=record.photo.lstrip('/').replace('static/', '').replace('\\', '/')) }}">
                                    View Photo
                                </button>
                            {% else %}
                                No Photo
                            {% endif %}
                        </td>
                        <td>
                            <form method="POST" action="{{ url_for('show_attendance', lecture_name=record.lecture_name, date=record.date, time=record.time) }}" style="display:inline;">
                                <input type="hidden" name="delete_roll_no" value="{{ record.roll_no }}">
                                <button type="submit" class="delete-btn" onclick="return confirm('Are you sure you want to delete this record?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="total-attended">
            Total Attended: {{ records|length }}
        </div>
        <a href="{{ url_for('admin') }}" class="back-btn">← Back to Admin</a>
        <div id="photoModal" style="display:none;position:fixed;z-index:1000;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
            <div style="background:#fff;width:700px;height:500px;max-width:98vw;max-height:90vh;padding:32px 32px 24px 32px;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,0.22);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;">
                <div style="flex:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
                    <img id="modalImg" src="" alt="Photo" style="display:block;width:auto;height:auto;max-width:100%;max-height:100%;object-fit:contain;border-radius:14px;box-shadow:0 2px 16px rgba(78,84,200,0.12);">
                </div>
                <button onclick="closeModal()" class="cta-button" style="margin-top:12px;">Close</button>
            </div>
        </div>
        <script>
            function closeModal() {
                document.getElementById('photoModal').style.display = 'none';
                document.getElementById('modalImg').src = '';
            }
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('.cta-button[data-photo]').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var imgSrc = btn.getAttribute('data-photo');
                        var modal = document.getElementById('photoModal');
                        var modalImg = document.getElementById('modalImg');
                        modalImg.onload = function() {
                            modal.style.display = 'flex';
                        };
                        modalImg.src = imgSrc;
                        if (modalImg.complete) {
                            modal.style.display = 'flex';
                        }
                    });
                });
                document.getElementById('photoModal').addEventListener('click', function(e) {
                    if (e.target === this) closeModal();
                });
            });
        </script>
    </main>
</body>
</html>
